spring:
  application:
    name: pedidos-service

  datasource:
    url: jdbc:postgresql://localhost:5432/pedidos_db
    username: ${DB_USER:pedidos}
    password: ${DB_PASSWORD:pedidos}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 500
          order_inserts: true
          order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/realms/pedidos}
          # Para pruebas locales sin Keycloak, se puede usar jwk-set-uri
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8080/realms/pedidos/protocol/openid-connect/certs}

server:
  port: 8081

pedidos:
  batch:
    size: ${BATCH_SIZE:500}
  timezone: America/Lima

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth2-redirect-url: /swagger-ui/oauth2-redirect.html

logging:
  level:
    root: INFO
    com.reto.pedidos: DEBUG
